services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-next-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_next}
      POSTGRES_USER: ${POSTGRES_USER:-rag_next}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_next}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_next} -d ${POSTGRES_DB:-rag_next}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: rag-next-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rag_next}:${POSTGRES_PASSWORD:-rag_next}@postgres:5432/${POSTGRES_DB:-rag_next}
      STORAGE_ROOT: /data/rag-next/storage
    volumes:
      - storage-data:/data/rag-next/storage
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_API_BASE_URL: /api
    container_name: rag-next-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres-data:
  storage-data:
